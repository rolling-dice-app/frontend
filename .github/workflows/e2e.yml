name: E2E

# True merge-gate for dev -> main. The full Playwright stack (throwaway Postgres +
# backend-from-source + a real browser) is heavy, so it runs only on PRs targeting
# main, not on every dev PR (those keep the lighter quality.yml gate).
#
# Backend strategy A: check out rolling-dice-app/backend @ main from source and let
# e2e/global-setup spawn it via tsx, so the backend stays zero-change. The exact
# backend commit under test is floating (always main) but recorded in the run summary
# for reproducibility -- main is what auto-deploys to prod, so this gate verifies the
# real "about to ship together" combination.
#
# Layout: frontend and backend are checked out as SIBLINGS under the workspace
# (frontend/ + backend/), mirroring the local repo layout. Nesting backend inside the
# frontend checkout makes pnpm walk up into frontend's workspace and mis-resolve the
# backend's own binaries (drizzle-kit/tsx), so keep them siblings.
#
# IMPORTANT (self-lock trap): do NOT mark this check "required" in branch protection
# until it has actually gone green on a real PR. Order: land this -> see it go green
# -> only then mark required and switch dev->main to PR-merge.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

defaults:
  run:
    working-directory: frontend

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend
          submodules: recursive

      # Strategy A: backend source, anchored to main, as a sibling of frontend/ so its
      # pnpm install/exec resolve against the backend's own root (not frontend's
      # workspace). Needs a cross-repo read token -- the job's automatic GITHUB_TOKEN
      # is scoped to this repo only.
      - name: Checkout backend (main, from source)
        uses: actions/checkout@v4
        with:
          repository: rolling-dice-app/backend
          ref: main
          path: backend
          token: ${{ secrets.BACKEND_CHECKOUT_TOKEN }}

      - name: Record backend commit under test
        run: |
          SHA="$(git -C "$GITHUB_WORKSPACE/backend" rev-parse HEAD)"
          echo "Backend under test: main @ $SHA"
          echo "- Backend tested: \`main\` @ \`$SHA\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI library dependencies
        run: cd packages/ui && pnpm install --frozen-lockfile --ignore-workspace

      - name: Build UI library
        run: cd packages/ui && pnpm build

      # Backend is run from source via tsx (drizzle-kit migrate, seed:spells, the
      # server itself), so it needs its own install in its own dir.
      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # global-setup brings up Testcontainers Postgres + the tsx backend; the Nuxt dev
      # server is managed by Playwright's webServer. BACKEND_DIR points global-setup at
      # the sibling backend checkout.
      - name: Run e2e
        run: pnpm test:e2e
        env:
          BACKEND_DIR: ${{ github.workspace }}/backend

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore
