name: E2E

# True merge-gate for dev -> main. The full Playwright stack (throwaway Postgres +
# backend-from-source + a real browser) is heavy, so it runs only on PRs targeting
# main, not on every dev PR (those keep the lighter quality.yml gate).
#
# Backend strategy A: check out rolling-dice-app/backend @ main from source and let
# e2e/global-setup spawn it via tsx, so the backend stays zero-change. The exact
# backend commit under test is floating (always main) but recorded in the run summary
# for reproducibility -- main is what auto-deploys to prod, so this gate verifies the
# real "about to ship together" combination.
#
# IMPORTANT (self-lock trap): do NOT mark this check "required" in branch protection
# until it has actually gone green on a real PR. It cannot pass until the
# BACKEND_CHECKOUT_TOKEN secret is provisioned, and a required-but-never-green check
# would dead-lock every release PR. Order: land this -> provision token -> see it go
# green -> only then mark required and switch dev->main to PR-merge.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Strategy A: backend source, anchored to main. Needs a cross-repo read token
      # (the job's automatic GITHUB_TOKEN is scoped to this repo only). Lands in a
      # dot-prefixed dir so Nuxt's app scan and the pnpm workspace never pick it up.
      - name: Checkout backend (main, from source)
        uses: actions/checkout@v4
        with:
          repository: rolling-dice-app/backend
          ref: main
          path: .backend-src
          token: ${{ secrets.BACKEND_CHECKOUT_TOKEN }}

      - name: Record backend commit under test
        run: |
          SHA="$(git -C .backend-src rev-parse HEAD)"
          echo "Backend under test: main @ $SHA"
          echo "- Backend tested: \`main\` @ \`$SHA\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI library dependencies
        run: cd packages/ui && pnpm install --frozen-lockfile --ignore-workspace

      - name: Build UI library
        run: cd packages/ui && pnpm build

      # Backend is run from source via tsx (drizzle-kit migrate, seed:spells, the
      # server itself), so it needs its own install. Reuses the packages token the
      # same way frontend does to pull @rolling-dice-app/core.
      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .backend-src
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # global-setup brings up Testcontainers Postgres + the tsx backend; the Nuxt dev
      # server is managed by Playwright's webServer. BACKEND_DIR points global-setup at
      # the checked-out backend instead of the local sibling default.
      - name: Run e2e
        run: pnpm test:e2e
        env:
          BACKEND_DIR: ${{ github.workspace }}/.backend-src

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
