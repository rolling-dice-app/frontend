name: Quality

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI library dependencies
        run: cd packages/ui && pnpm install --frozen-lockfile --ignore-workspace

      - name: Build UI library
        run: cd packages/ui && pnpm build

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint:check

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test:unit:ci
